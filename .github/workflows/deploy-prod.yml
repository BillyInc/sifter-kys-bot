name: Production Deploy (tags)

# Protected production pipeline. Dev deploys on push to main (deploy-backend.yml /
# deploy-frontend.yml, environment: development). PROD deploys ONLY on a version tag
# (v1.2.3) and runs against the isolated Supabase project + a separate systemd service
# on the same host. The `production` GitHub Environment holds all prod secrets and can
# require a manual approver.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or SHA to deploy to production'
        required: true

concurrency:
  group: prod-deploy
  cancel-in-progress: false   # never cancel a prod deploy mid-flight

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '24'
  PROD_BACKEND_DIR: ~/sifter-backend-prod
  PROD_FRONTEND_DIR: ~/sifter-frontend-prod

jobs:
  # ── Gate: lint + tests must pass before anything touches prod ──
  verify:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --extra dev
      - name: flake8 (blocking errors only)
        run: uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv
      - name: Tests
        run: uv run pytest --tb=short -q

  # ── Backend → prod service on the same box ──
  deploy-backend:
    name: Deploy Backend (prod)
    runs-on: ubuntu-latest
    needs: verify
    environment: production          # gated secrets + optional required approver
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER" >> ~/.ssh/known_hosts

      - name: Create prod .env on first deploy only
        env:
          SERVER: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          ENV_CONTENT: ${{ secrets.ENV_FILE }}   # PROD env file (production environment secret)
        run: |
          HAS_ENV=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$USER@$SERVER" "test -f ${{ env.PROD_BACKEND_DIR }}/.env && echo yes || echo no")
          if [ "$HAS_ENV" = "no" ]; then
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$USER@$SERVER" "mkdir -p ${{ env.PROD_BACKEND_DIR }}"
            echo "$ENV_CONTENT" > /tmp/prod.env
            scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no /tmp/prod.env "$USER@$SERVER:${{ env.PROD_BACKEND_DIR }}/.env"
            rm -f /tmp/prod.env
            echo "Created prod .env"
          else
            echo "prod .env already present — leaving untouched"
          fi

      - name: Deploy with rsync (prod dir)
        env:
          SERVER: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          rsync -avz --delete \
            --exclude '.venv' --exclude '__pycache__' --exclude '*.pyc' \
            --exclude 'logs/' --exclude '*.db' --exclude '.git' --exclude '.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            Backend/ "$USER@$SERVER:${{ env.PROD_BACKEND_DIR }}/"

      - name: Install prod systemd units, deps, restart
        env:
          SERVER: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$USER@$SERVER" 'bash -s' <<'ENDSSH'
            set -e
            cd ~/sifter-backend-prod
            chmod 600 .env 2>/dev/null || true
            command -v uv >/dev/null 2>&1 || curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
            uv sync
            mkdir -p logs
            # Derive prod systemd units from the dev unit files: rename the service,
            # repoint WorkingDirectory + EnvironmentFile to the prod dir, and remap
            # the gunicorn bind 5000 -> 5001 so prod never collides with dev on the
            # same box. Same box, separate services — sifter-backend-prod, etc.
            for f in systemd/*.service; do
              base=$(basename "$f" .service)
              sudo sed -e "s#/home/ubuntu/sifter-backend#$HOME/sifter-backend-prod#g" \
                       -e "s#0.0.0.0:5000#0.0.0.0:5001#g" \
                       -e "s/Sifter /Sifter PROD /" "$f" \
                       | sudo tee "/etc/systemd/system/${base}-prod.service" >/dev/null
            done
            sudo systemctl daemon-reload
            # Enable + (re)start the full prod stack. Celery is the production scheduler:
            # celery-beat-prod runs sync_clusters_to_helius + the beat schedule, the
            # workers drain the queues, wallet-monitor-prod polls watchlist wallets.
            # Prod is isolated from dev via its own Redis broker + ClickHouse in the prod
            # .env, so the two beat schedulers never double-fire.
            # (RQ analysis workers use a server-side rq-worker@ template, not managed here.)
            PROD_SERVICES="sifter-backend-prod celery-worker-prod celery-beat-prod celery-alerts-worker-prod wallet-monitor-prod"
            sudo systemctl enable $PROD_SERVICES 2>/dev/null || true
            sudo systemctl reload-or-restart sifter-backend-prod
            sudo systemctl restart celery-worker-prod celery-beat-prod celery-alerts-worker-prod wallet-monitor-prod
            echo "Prod backend + workers deployed."
          ENDSSH

      - name: Setup nginx + SSL (prod backend) on first deploy
        env:
          SERVER: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$USER@$SERVER" bash << 'ENDSSH'
            if [ ! -f /etc/nginx/sites-available/kys-api-prod ]; then
              sudo tee /etc/nginx/sites-available/kys-api-prod > /dev/null << 'NGINX'
          server {
              server_name api.kys.levelup.com.ng;
              location / {
                  proxy_pass http://localhost:5001;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
              listen 80;
          }
          NGINX
              sudo ln -sf /etc/nginx/sites-available/kys-api-prod /etc/nginx/sites-enabled/
              sudo nginx -t && sudo systemctl reload nginx
              sudo certbot --nginx -d api.kys.levelup.com.ng --non-interactive --agree-tos --redirect || echo "Certbot may need manual setup"
            else
              sudo nginx -t && sudo systemctl reload nginx
            fi
          ENDSSH

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ── Frontend → prod build + prod domain ──
  deploy-frontend:
    name: Deploy Frontend (prod)
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - name: Build (prod env)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}   # prod backend URL (production env var)
        run: pnpm run build

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER" >> ~/.ssh/known_hosts

      - name: Deploy build to prod frontend dir
        env:
          SERVER: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$USER@$SERVER" "mkdir -p ${{ env.PROD_FRONTEND_DIR }}"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            dist/ "$USER@$SERVER:${{ env.PROD_FRONTEND_DIR }}/"

      - name: Setup nginx + SSL (prod frontend) on first deploy
        env:
          SERVER: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$USER@$SERVER" bash << 'ENDSSH'
            FRONTEND_ROOT="$HOME/sifter-frontend-prod"
            if [ ! -f /etc/nginx/sites-available/kys-web-prod ]; then
              sudo tee /etc/nginx/sites-available/kys-web-prod > /dev/null << NGINX
          server {
              server_name kys.levelup.com.ng;
              root ${FRONTEND_ROOT};
              index index.html;
              location / {
                  try_files \$uri \$uri/ /index.html;
              }
              location /assets {
                  expires 1y;
                  add_header Cache-Control "public, immutable";
              }
              add_header X-Frame-Options "SAMEORIGIN" always;
              add_header X-Content-Type-Options "nosniff" always;
              add_header Referrer-Policy "strict-origin-when-cross-origin" always;
              listen 80;
          }
          NGINX
              sudo ln -sf /etc/nginx/sites-available/kys-web-prod /etc/nginx/sites-enabled/
              sudo nginx -t && sudo systemctl reload nginx
              sudo certbot --nginx -d kys.levelup.com.ng --non-interactive --agree-tos --redirect || echo "Certbot may need manual setup"
            else
              sudo nginx -t && sudo systemctl reload nginx
            fi
          ENDSSH

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
