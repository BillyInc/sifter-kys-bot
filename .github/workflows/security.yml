name: Security Scanning

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6:00 UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ========================
  # Secret Scanning
  # ========================
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run trufflehog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --results=verified
        continue-on-error: true

  # ========================
  # Frontend Audit
  # ========================
  frontend-audit:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: pnpm audit --prod || echo "::warning::Frontend audit found vulnerabilities"
        continue-on-error: true

  # ========================
  # Backend Audit
  # ========================
  backend-audit:
    name: Backend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run pip-audit
        run: uv run pip-audit || echo "::warning::Backend audit found vulnerabilities"
        continue-on-error: true

  # ========================
  # Summary
  # ========================
  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, frontend-audit, backend-audit]
    if: always()
    steps:
      - name: Security scan summary
        env:
          GITLEAKS_RESULT: ${{ needs.gitleaks.result }}
          FRONTEND_RESULT: ${{ needs.frontend-audit.result }}
          BACKEND_RESULT: ${{ needs.backend-audit.result }}
        run: |
          echo "## Security Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Gitleaks:** $GITLEAKS_RESULT" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Frontend audit:** $FRONTEND_RESULT" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Backend audit:** $BACKEND_RESULT" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
