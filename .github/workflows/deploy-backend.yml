name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'Backend/**'
      - '.github/workflows/deploy-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_PATH: ~/sifter-backend
  PYTHON_VERSION: '3.11'

jobs:
  # ==================
  # Lint & Type Check
  # ==================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run flake8
        run: uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run pyright
        run: uv run pyright --warnings
        continue-on-error: true

  # ==================
  # Tests
  # ==================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest --tb=short -q

  # ==================
  # Deploy (main only)
  # ==================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER" >> ~/.ssh/known_hosts

      - name: Create .env file
        env:
          ENV_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          echo "$ENV_CONTENT" > Backend/.env
          chmod 600 Backend/.env

      - name: Deploy with rsync
        env:
          SERVER: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          rsync -avz --delete \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'logs/' \
            --exclude '*.db' \
            --exclude '.git' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            Backend/ \
            "$USER@$SERVER:~/sifter-backend/"

      - name: Install dependencies and restart
        env:
          SERVER: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$USER@$SERVER" << 'ENDSSH'
            cd ~/sifter-backend

            # Secure .env file permissions
            chmod 600 .env

            # Install uv if not present
            if ! command -v uv &> /dev/null; then
              curl -LsSf https://astral.sh/uv/install.sh | sh
            fi
            export PATH="$HOME/.local/bin:$PATH"

            # Install dependencies with uv
            uv sync

            # Create logs directory
            mkdir -p logs

            # Install/update systemd service files
            sudo cp systemd/*.service /etc/systemd/system/
            sudo systemctl daemon-reload

            # Enable services on first deploy
            sudo systemctl enable sifter-backend rq-worker@{1..5} wallet-monitor 2>/dev/null || true

            # Restart services
            sudo systemctl reload-or-restart sifter-backend
            sudo systemctl restart rq-worker@{1..5}
            sudo systemctl restart wallet-monitor

            echo "Backend deployment complete!"
          ENDSSH

      - name: Health check
        continue-on-error: true
        env:
          SERVER: ${{ secrets.SERVER_HOST }}
        run: |
          sleep 10
          curl -f --max-time 30 "http://$SERVER:5000/health" && echo "Health check passed!" || echo "::warning::Health check failed"

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -f Backend/.env
