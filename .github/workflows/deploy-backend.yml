name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'Backend/**'
      - '.github/workflows/deploy-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_PATH: ~/sifter-backend
  PYTHON_VERSION: '3.11'

jobs:
  # ========================
  # Detect changed paths
  # ========================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for backend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Backend/**'
              - '.github/workflows/deploy-backend.yml'

  # ==================
  # Lint & Type Check
  # ==================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run flake8
        run: uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv

      - name: Run pyright
        run: uv run pyright --warnings
        continue-on-error: true

  # ==================
  # Tests
  # ==================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest --tb=short -q

  # ==================
  # Deploy (main only)
  # ==================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [changes, lint, test]
    if: |
      (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER" >> ~/.ssh/known_hosts

      - name: Create .env on first deploy only
        env:
          SERVER: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          ENV_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          HAS_ENV=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$USER@$SERVER" "test -f ~/sifter-backend/.env && echo yes || echo no")
          if [ "$HAS_ENV" = "no" ]; then
            echo "$ENV_CONTENT" > /tmp/deploy.env
            scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no /tmp/deploy.env "$USER@$SERVER:~/sifter-backend/.env"
            rm -f /tmp/deploy.env
            echo "Created .env on server"
          else
            echo ".env already exists on server — skipping"
          fi

      - name: Deploy with rsync
        env:
          SERVER: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          rsync -avz --delete \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'logs/' \
            --exclude '*.db' \
            --exclude '.git' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            Backend/ \
            "$USER@$SERVER:~/sifter-backend/"

      - name: Install dependencies and restart
        env:
          SERVER: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$USER@$SERVER" << 'ENDSSH'
            cd ~/sifter-backend
            chmod 600 .env 2>/dev/null || true

            # Install uv if not present
            if ! command -v uv &> /dev/null; then
              curl -LsSf https://astral.sh/uv/install.sh | sh
            fi
            export PATH="$HOME/.local/bin:$PATH"

            # Install dependencies with uv
            uv sync

            # Create logs directory
            mkdir -p logs

            # Install/update systemd service files
            sudo cp systemd/*.service /etc/systemd/system/
            sudo systemctl daemon-reload

            # Enable services on first deploy
            sudo systemctl enable sifter-backend rq-worker@{1..5} wallet-monitor 2>/dev/null || true

            # Restart services
            sudo systemctl reload-or-restart sifter-backend
            sudo systemctl restart rq-worker@{1..5}
            sudo systemctl restart wallet-monitor

            echo "Backend deployment complete!"
          ENDSSH

      - name: Health check
        continue-on-error: true
        env:
          SERVER: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          sleep 10
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$USER@$SERVER" 'curl -sf http://localhost:5000/health' && echo "Health check passed!" || echo "::warning::Health check failed"

      - name: Deployment summary
        if: always()
        run: |
          echo "## Backend Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Actor:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -f Backend/.env
