name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  DEPLOY_PATH: ~/sifter-frontend

jobs:
  # ==================
  # Lint
  # ==================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint || echo "Lint warnings found"
        continue-on-error: true

  # ==================
  # Build
  # ==================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    environment: development
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://sifter-kys.duckdns.org' }}
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  # ==================
  # Deploy (main only)
  # ==================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    environment: development

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER" >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        env:
          SERVER: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            frontend/dist/ \
            "$USER@$SERVER:~/sifter-frontend/"

      - name: Setup nginx and SSL on first deploy
        env:
          SERVER: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$USER@$SERVER" bash << 'ENDSSH'

            FRONTEND_ROOT="$HOME/sifter-frontend"

            # Create nginx config for frontend if not exists
            if [ ! -f /etc/nginx/sites-available/sifter-kys-web ]; then
              sudo tee /etc/nginx/sites-available/sifter-kys-web > /dev/null << NGINX
          server {
              server_name sifter-kys-web.duckdns.org;

              root ${FRONTEND_ROOT};
              index index.html;

              location / {
                  try_files \$uri \$uri/ /index.html;
              }

              location /assets {
                  expires 1y;
                  add_header Cache-Control "public, immutable";
              }

              add_header X-Frame-Options "SAMEORIGIN" always;
              add_header X-Content-Type-Options "nosniff" always;
              add_header Referrer-Policy "strict-origin-when-cross-origin" always;

              listen 80;
          }
          NGINX

              sudo ln -sf /etc/nginx/sites-available/sifter-kys-web /etc/nginx/sites-enabled/
              sudo nginx -t && sudo systemctl reload nginx
              sudo certbot --nginx -d sifter-kys-web.duckdns.org --non-interactive --agree-tos || echo "Certbot may need manual setup"
            else
              sudo nginx -t && sudo systemctl reload nginx
            fi

            echo "Frontend deployment complete!"
          ENDSSH

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
